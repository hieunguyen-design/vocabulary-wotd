<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word of the Day</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
      body {
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        background-color: #f7f8fa;
        color: #555;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 2rem;
        box-sizing: border-box;
      }
      .container {
        background: #fff;
        padding: 3rem;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        max-width: 600px;
        width: 100%;
        text-align: center;
      }
      h1 {
        color: #888;
        font-size: 1rem;
        font-weight: 400;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 1rem;
      }
      h2 {
        color: #222;
        font-size: 3rem;
        font-weight: 700;
        margin: 0 0 1.5rem 0;
      }
      p {
        color: #444;
        font-size: 1.1rem;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Word of the Day</h1>
      <h2 id="word"></h2>
      <p id="usage"></p>
    </div>
    <script>
      async function fetchWordOfTheDay() {
        try {
          const response = await fetch('wotd.json');
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          const data = await response.json();
          document.getElementById('word').textContent = data.word;
          document.getElementById('usage').textContent = data.usage;
        } catch (error) {
          console.error('Error fetching word of the day:', error);
        }
      }
      fetchWordOfTheDay();
    </script>
  </body>
</html>
