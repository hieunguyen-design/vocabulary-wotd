    <h1>Word of the Day</h1>
    <h2>impalpable</h2>
    <p>Impalpable describes a feeling that, though real, you can’t logically explain. If you don't know why you love peanut butter and banana sandwiches so much, maybe your reasons are impalpable.</p>
