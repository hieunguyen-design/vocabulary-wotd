name: Update Word of the Day

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  # Runs at 3:00 AM UTC every day
  schedule:
    - cron: '0 3 * * *'

# Add permissions for deployment
permissions:
  contents: write # Allow writing to the repository (for git-auto-commit-action)
  pages: write # Allow deploying to GitHub Pages
  id-token: write # Allow authentication for deployment

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Use a stable LTS version

      - name: Install dependencies
        run: npm install

      - name: Run scraper to update index.html
        run: npm run start

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: Update Word of the Day'
          file_pattern: _site/index.html

  # Add a new job to handle the deployment
  deploy:
    # This job will only run after the build job is complete AND on the main branch
    needs: build
    if: github.ref == 'refs/heads/main' # Or your default branch name

    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
